core_profile:
  - Postdoctoral researcher in applied mathematics at USI, previously postdoc at RWTH Aachen.
  - Ph.D. in Mathematics on robust control strategies for mean-field collective dynamics, defended with distinction.
  - Research focus: numerical analysis, optimization, optimal/model-predictive/sparse/turnpike control, multi-agent systems, mean-field theory, multiscale models, and uncertainty quantification.
  - Machine learning focus: neural networks, kernel methods, large-scale approximation, surrogate modelling, and learning methods for interacting particle systems.
  - Mathematical finance focus: American option pricing, optimal stopping, conditional mean embeddings, and large-scale kernel methods in financial economics.
  - Strong academic output across optimal control, mean-field models, multi-agent systems, kernel methods, traffic/mean-field games, and stochastic collective dynamics.

