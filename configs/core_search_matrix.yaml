portals:
  linkedin:
    enabled: true
    url_template: "https://www.linkedin.com/jobs/search/?keywords={query}&location={location}"
  jobs_ch:
    enabled: true
    url_template: "https://www.jobs.ch/en/vacancies/?term={query}&location={location}"
  jobup:
    enabled: true
    url_template: "https://www.jobup.ch/en/jobs/?term={query}&location={location}"
  indeed:
    enabled: true
    url_template: "https://www.indeed.com/jobs?q={query}&l={location}"
  euraxess:
    enabled: true
    url_template: "https://euraxess.ec.europa.eu/jobs/search?keywords={query}&f%5B0%5D=country%3A{location}"
  academicpositions:
    enabled: true
    url_template: "https://academicpositions.com/find-jobs?search={query}&location={location}"
  naturecareers:
    enabled: true
    url_template: "https://www.nature.com/naturecareers/jobs/search/?Keywords={query}&LocationId={location}"
  jobs_ac_uk:
    enabled: true
    url_template: "https://www.jobs.ac.uk/search/?keywords={query}&location={location}"
